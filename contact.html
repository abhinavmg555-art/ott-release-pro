<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - OTT Movie Tracker</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #141414; color: #fff; padding: 5%; line-height: 1.6; }
        h1, h2 { color: #E50914; }
        a { color: #4da8da; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: auto; background: #181818; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 4px; background: #000; color: #fff; }
        .btn { background: #E50914; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #f40612; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>Have questions, feedback, or suggestions? Reach out to us!</p>
        <form onsubmit="event.preventDefault(); alert('Message sent! We will get back to you soon.');">
            <div class="form-group">
                <label>Name</label>
                <input type="text" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea rows="5" required></textarea>
            </div>
            <button type="submit" class="btn">Send Message</button>
        </form>
        <p style="margin-top: 20px;"><a href="index.html">&larr; Back to Home</a></p>
    </div>
</body>
</html>
