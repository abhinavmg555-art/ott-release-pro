<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT Release Pro | Track Latest OTT Movie Releases Instantly</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Header / Navbar -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <h2 style="letter-spacing: 1px;">OTT<span>Release Pro</span></h2>
        </a>
        <div class="nav-controls-top">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search movies or series...">
                <button id="searchBtn" class="search-button">🔍</button>
            </div>
            <button id="themeToggle" class="theme-btn">☀️</button>
        </div>
    </header>

    <!-- Platform Filters -->
    <div class="filters-container">
        <div class="platform-filters">
            <button class="filter-btn active" data-provider="all">All</button>
            <button class="filter-btn netflix-btn" data-provider="8">Netflix</button>
            <button class="filter-btn prime-btn" data-provider="119">Prime Video</button>
            <button class="filter-btn hotstar-btn" data-provider="122">Disney+ Hotstar</button>
            <button class="filter-btn others-btn" data-provider="others">Others</button>
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero-section" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle"></h1>
            <div class="hero-meta" id="heroMeta"></div>
            <p class="hero-desc" id="heroDesc"></p>
            <button id="heroTrailerBtn" class="btn-primary" style="display: none;">▶ Watch Trailer</button>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <section class="container">
            <h2 class="section-title">🔥 Trending Now</h2>
            <div class="movie-grid" id="trendingGrid"></div>
        </section>

        <section class="container">
            <h2 class="section-title">📺 New & Latest Releases</h2>
            <div class="movie-grid" id="latestGrid"></div>
            <div id="noResultsMsg" style="display: none; text-align: center; margin-top: 20px;">No results found</div>
        </section>
    </main>

    <!-- Simple About Section Above Footer -->
    <section class="container" style="text-align: center; padding: 20px 5%; border-top: 1px solid var(--border); margin-top: 40px;">
        <h3 style="margin-bottom: 10px;">About OTT Release Pro</h3>
        <p style="color: var(--text-secondary);">This website provides latest OTT release updates including Netflix, Prime Video, and more.</p>
    </section>

    <!-- Footer -->
    <footer class="footer" style="text-align: center; padding: 20px; font-size: 0.9rem;">
        <p>&copy; 2026 OTT Release Pro. All Rights Reserved.</p>
        <div style="margin-top: 10px; display: flex; justify-content: center; gap: 15px;">
            <a href="about.html">About</a> | <a href="contact.html">Contact</a> | <a href="privacy.html">Privacy Policy</a>
        </div>
    </footer>

    <!-- YouTube Trailer Modal -->
    <div class="modal-overlay" id="trailerModal">
        <div class="modal-content">
            <button class="trailer-close" id="closeTrailer">✕</button>
            <div class="video-container" id="trailerContainer"></div>
        </div>
    </div>

    <button id="backToTop" class="back-to-top">↑</button>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
